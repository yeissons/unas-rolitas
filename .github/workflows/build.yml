name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Descomprimir proyecto
        run: |
          unzip -q unas_rolitas_android_project.zip -d proyecto
          cd proyecto
          chmod +x gradlew

      - name: Compilar APK
        working-directory: proyecto
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: unas-rolitas-debug
          path: proyecto/app/build/outputs/apk/debug/*.apk
