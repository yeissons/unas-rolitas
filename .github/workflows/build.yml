name: Build Unas Rolitas APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract Android project ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No se encontró ningún archivo ZIP."
            exit 1
          fi

          echo "ZIP encontrado: $ZIP_FILE"

          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted

      - name: Find Android project
        id: find_project
        run: |
          PROJECT_DIR=$(dirname "$(find extracted -name 'settings.gradle.kts' -type f | head -n 1)")

          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            echo "ERROR: No se encontró settings.gradle.kts."
            exit 1
          fi

          echo "Proyecto Android encontrado en:"
          echo "$PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Fix incompatible Compose plugin
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          sed -i '/alias(libs.plugins.kotlin.compose) apply false/d' build.gradle.kts
          sed -i '/kotlin-compose =/d' gradle/libs.versions.toml

          echo "Plugin Compose incompatible eliminado."

          echo "===== build.gradle.kts ====="
          cat build.gradle.kts

          echo "===== Comprobación kotlin-compose ====="
          grep "kotlin-compose" gradle/libs.versions.toml || echo "kotlin-compose eliminado correctamente."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          gradle assembleDebug --stacktrace

      - name: Find generated APK
        id: find_apk
        run: |
          APK=$(find extracted -type f -path "*/build/outputs/apk/debug/*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "ERROR: No se encontró el APK."
            exit 1
          fi

          echo "APK encontrado:"
          echo "$APK"

          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unas-rolitas-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
