name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Descomprimir proyecto
        run: |
          rm -rf proyecto
          mkdir proyecto
          unzip -q unas_rolitas_android_project.zip -d proyecto

      - name: Corregir MainScreen.kt
        run: |
          FILE="proyecto/app/src/main/java/com/unasrolitas/app/ui/MainScreen.kt"
          python3 - "$FILE" <<'PY'
          import sys

          path = sys.argv[1]

          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          annotation = "@file:OptIn(androidx.compose.material3.ExperimentalMaterial3Api::class)"

          if annotation not in content:
              content = content.replace(
                  "package com.unasrolitas.app.ui",
                  annotation + "\n\npackage com.unasrolitas.app.ui",
                  1
              )

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          PY

      - name: Compilar APK
        run: |
          cd proyecto
          gradle assembleDebug --stacktrace

      - name: Buscar APK
        run: |
          find proyecto -type f -name "*.apk" -print

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: unas-rolitas-debug
          path: "**/build/outputs/apk/debug/*.apk"
