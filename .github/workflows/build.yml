name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Descomprimir proyecto
        run: |
          rm -rf proyecto
          mkdir proyecto
          unzip -q unas_rolitas_android_project.zip -d proyecto

      - name: Buscar proyecto Android
        run: |
          echo "Buscando Gradle Wrapper..."
          find proyecto -name gradlew -type f -print

      - name: Preparar Gradle
        run: |
          GRADLEW=$(find proyecto -name gradlew -type f | head -1)
          chmod +x "$GRADLEW"

      - name: Compilar APK
        run: |
          GRADLEW=$(find proyecto -name gradlew -type f | head -1)
          PROJECT_DIR=$(dirname "$GRADLEW")
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: unas-rolitas-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
