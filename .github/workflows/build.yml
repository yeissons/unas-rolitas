name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Descomprimir proyecto
        run: |
          rm -rf proyecto
          mkdir proyecto
          unzip -q unas_rolitas_android_project.zip -d proyecto

      - name: Mostrar estructura del proyecto
        run: |
          echo "Contenido del proyecto:"
          find proyecto -maxdepth 4 -type f | sort

      - name: Compilar APK
        run: |
          cd proyecto
          gradle assembleDebug --stacktrace

      - name: Buscar APK
        run: |
          find proyecto -type f -name "*.apk" -print

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: unas-rolitas-debug
          path: "**/build/outputs/apk/debug/*.apk"
