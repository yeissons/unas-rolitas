name: Build Unas Rolitas APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract Android project ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No se encontró ningún archivo ZIP."
            exit 1
          fi

          echo "ZIP encontrado: $ZIP_FILE"

          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted

      - name: Find Android project
        id: find_project
        run: |
          PROJECT_DIR=$(dirname "$(find extracted -name 'settings.gradle.kts' -type f | head -n 1)")

          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            echo "ERROR: No se encontró settings.gradle.kts."
            exit 1
          fi

          echo "Proyecto Android encontrado en:"
          echo "$PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Fix project resources
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          echo "Corrigiendo plugin Compose incompatible..."

          sed -i '/alias(libs.plugins.kotlin.compose) apply false/d' build.gradle.kts
          sed -i '/kotlin-compose =/d' gradle/libs.versions.toml

          echo "Creando directorios..."

          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          echo "Creando backup_rules.xml..."

          cat > app/src/main/res/xml/backup_rules.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
          </full-backup-content>
          EOF

          echo "Creando data_extraction_rules.xml..."

          cat > app/src/main/res/xml/data_extraction_rules.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
              </cloud-backup>
              <device-transfer>
              </device-transfer>
          </data-extraction-rules>
          EOF

          echo "Creando Theme.UnasRolitas..."

          cat > app/src/main/res/values/themes.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.UnasRolitas" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#6200EE</item>
                  <item name="android:navigationBarColor">#000000</item>
                  <item name="android:statusBarColor">#000000</item>
              </style>
          </resources>
          EOF

          echo "Creando icono de aplicación..."

          cat > app/src/main/res/drawable/ic_launcher_background.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#6200EE" />
          </shape>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,20 A34,34 0,1 0,54,88 A34,34 0,1 0,54,20" />
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          echo "Recursos creados correctamente."

          echo "===== Archivos de recursos ====="
          find app/src/main/res -type f | sort

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          gradle assembleDebug --stacktrace

      - name: Find generated APK
        id: find_apk
        run: |
          APK=$(find extracted -type f -path "*/build/outputs/apk/debug/*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "ERROR: No se encontró el APK."
            exit 1
          fi

          echo "APK encontrado:"
          echo "$APK"

          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unas-rolitas-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
